<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background panel matching our app slate-950 -->
  <rect width="512" height="512" rx="128" fill="#090d16"/>
  
  <!-- Ambient outer circle -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#10b981" stroke-width="20" stroke-opacity="0.15"/>
  
  <!-- Neon cyan dashed analyzer orbit -->
  <circle cx="256" cy="256" r="140" fill="none" stroke="#14b8a6" stroke-width="12" stroke-dasharray="35 25" stroke-opacity="0.6"/>
  
  <!-- Central glowing lens eye -->
  <circle cx="256" cy="256" r="80" fill="none" stroke="#10b981" stroke-width="16"/>
  
  <!-- Focal core -->
  <circle cx="256" cy="256" r="40" fill="#10b981" opacity="0.9"/>
  
  <!-- Lens reflection glare -->
  <path d="M 256 176 Q 256 220 310 256 Q 256 292 256 336 Q 256 292 202 256 Q 256 220 256 176" fill="#ffffff" opacity="0.9"/>
</svg>
